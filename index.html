<img src="https://images.unsplash.com/photo-1587248720327-8eb72564be1e" class="h-40 w-full object-cover">

<p>₹400</p>
<button onclick="addToCart('Dessert Box',400)" class="w-full mt-2 bg-[#5A3E36] text-white py-2 rounded-full">Add to Cart</button>
</div>
</div></div>
</section><!-- CART --><div id="cartModal" class="hidden fixed inset-0 bg-black/50 flex justify-center items-center">
<div class="bg-white p-6 rounded-xl w-80">
<h2 class="text-xl font-bold mb-3">Your Cart</h2>
<ul id="cart-items"></ul>
<p>Total: ₹<span id="total">0</span></p>
<button onclick="payNow()" class="bg-green-600 text-white w-full py-2 mt-3 rounded">Pay Now</button>
<button onclick="closeCart()" class="mt-2 w-full">Close</button>
</div>
</div><script>
let cart = [];

function addToCart(name, price){
cart.push({name, price});
updateCart();
}

function updateCart(){
document.getElementById('cart-count').innerText = cart.length;
let list = document.getElementById('cart-items');
list.innerHTML = '';
let total = 0;

cart.forEach(item => {
total += item.price;
list.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
});

document.getElementById('total').innerText = total;
}

function openCart(){ document.getElementById('cartModal').classList.remove('hidden'); }
function closeCart(){ document.getElementById('cartModal').classList.add('hidden'); }

function payNow(){
let total = cart.reduce((sum, item) => sum + item.price, 0);

var options = {
key: "YOUR_RAZORPAY_KEY",
amount: total * 100,
currency: "INR",
name: "The Sugar Box",
handler: function (response){
alert("Payment Successful: " + response.razorpay_payment_id);
sendWhatsApp(total);
}
};

var rzp = new Razorpay(options);
rzp.open();
}

function sendWhatsApp(total){
let message = "New Order:%0A";
cart.forEach(item => {
message += item.name + " - ₹" + item.price + "%0A";
});
message += "Total: ₹" + total;

window.open(`https://wa.me/919460527300?text=${message}`);
}
</script></body>
</html>
