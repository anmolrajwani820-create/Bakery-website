<!DOCTYPE html>
<html lang="en">
<head>

      background: #ff8c42;

      font-size: 20px;

<div class="hero">

  <p>Order now and enjoy delicious treats!</p>

  <button class="btn" onclick="alert('Order placed!')">

  </button>

<!-- WhatsApp Button -->
<a

  class="whatsapp"

>
  💬
