 <!-- UPDATED: Advanced Order + Cart + Razorpay + Tracking + WhatsApp --><!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Sugar Box</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
body { font-family: 'Poppins', sans-serif; }
.card { transition: all 0.3s ease; }
.card:hover { transform: translateY(-10px) scale(1.03); }
</style></head><body class="bg-[#FFF8F2] text-[#2D1B14]"><!-- CART BUTTON --><div class="fixed bottom-5 right-5 z-50">
  <button onclick="openCart()" class="bg-black text-white px-5 py-3 rounded-full">
    🛒 Cart (<span id="cart-count">0</span>)
  </button>
</div><!-- CART MODAL --><div id="cartModal" class="hidden fixed inset-0 bg-black/50 flex justify-center items-center">
  <div class="bg-white p-6 rounded-xl w-80">
    <h2 class="text-xl font-bold mb-3">Your Cart</h2>
    <ul id="cart-items" class="text-sm mb-4"></ul>
    <p>Total: ₹<span id="total">0</span></p>
    <button onclick="payNow()" class="bg-green-600 text-white w-full py-2 mt-3 rounded">Pay Now</button>
    <button onclick="closeCart()" class="mt-2 w-full">Close</button>
  </div>
</div><!-- PRODUCTS --><div class="grid md:grid-cols-3 gap-6 p-6"><!-- PRODUCT --><div class="card bg-white p-4 rounded-xl shadow">
  <h3>Chocolate Brownie</h3>
  <p>₹250</p>
  <button onclick="addToCart('Chocolate Brownie',250)" class="bg-brown-700 text-white px-3 py-2 rounded mt-2">Add to Cart</button>
</div><div class="card bg-white p-4 rounded-xl shadow">
  <h3>Choco Chip Cookies</h3>
  <p>₹200</p>
  <button onclick="addToCart('Choco Chip Cookies',200)" class="bg-brown-700 text-white px-3 py-2 rounded mt-2">Add to Cart</button>
</div></div><script>
let cart = [];

function addToCart(name, price){
  cart.push({name, price});
  updateCart();
}

function updateCart(){
  document.getElementById('cart-count').innerText = cart.length;
  let list = document.getElementById('cart-items');
  list.innerHTML = '';
  let total = 0;

  cart.forEach(item => {
    total += item.price;
    list.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
  });

  document.getElementById('total').innerText = total;
}

function openCart(){ document.getElementById('cartModal').classList.remove('hidden'); }
function closeCart(){ document.getElementById('cartModal').classList.add('hidden'); }

function payNow(){
  let total = cart.reduce((sum, item) => sum + item.price, 0);

  var options = {
    "key": "YOUR_RAZORPAY_KEY",
    "amount": total * 100,
    "currency": "INR",
    "name": "The Sugar Box",
    "description": "Order Payment",
    "handler": function (response){
      alert("Payment Successful! Order ID: " + response.razorpay_payment_id);
      sendWhatsApp(total);
    }
  };

  var rzp = new Razorpay(options);
  rzp.open();
}

function sendWhatsApp(total){
  let message = "New Order:%0A";
  cart.forEach(item => {
    message += item.name + " - ₹" + item.price + "%0A";
  });
  message += "Total: ₹" + total;

  window.open(`https://wa.me/919460527300?text=${message}`);
}

</script><!-- ORDER TRACKING --><div class="p-6 text-center">
  <h2 class="text-xl font-bold">Track Your Order</h2>
  <input id="orderId" placeholder="Enter Order ID" class="border p-2 mt-2">
  <button onclick="trackOrder()" class="bg-black text-white px-4 py-2 ml-2">Track</button>
  <p id="status" class="mt-3"></p>
</div><script>
function trackOrder(){
  let id = document.getElementById('orderId').value;
  document.getElementById('status').innerText = "Order " + id + " is being prepared 🍰";
}
</script></body>
</html>
